<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>실시간 구글맵 - 투명 윤곽선</title>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD8swteRAgf-r_tS_uncv_IWJKcGghanrY"></script>
<script>
let map;

// ✅ 배경 투명 + 윤곽선만 표시
const transparentStyle = [
  { featureType: "all", elementType: "geometry.fill", stylers: [{ visibility: "off" }] },
  { featureType: "all", elementType: "labels", stylers: [{ visibility: "off" }] },

  { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#ffffff" }] },
  { featureType: "administrative", elementType: "geometry.stroke", stylers: [{ color: "#ff0000" }] },
  { featureType: "landscape", elementType: "geometry.stroke", stylers: [{ color: "#00ff00" }] },
  { featureType: "water", elementType: "geometry.stroke", stylers: [{ color: "#0000ff" }] }
];

window.onload = function() {
    const container = document.getElementById("map");
    map = new google.maps.Map(container, {
        center: {lat: 37.5665, lng: 126.9780}, // 서울시청
        zoom: 14,
        disableDefaultUI: true,
        backgroundColor: "transparent", // ✅ 지도 배경 투명
        styles: transparentStyle
    });
};
</script>
<style>
/* ✅ body 완전 투명 */
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: transparent !important;
}

#map {
  width: 100vw;
  height: 100vh;
  background: transparent !important; /* 지도 컨테이너도 투명 */
}
</style>
</head>
<body>
<div id="map"></div>
</body>
</html>
